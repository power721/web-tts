<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本转语音 TTS</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎙️ 文本转语音</h1>
            <p class="subtitle">基于 Microsoft Edge TTS</p>
        </header>

        <main>
            <!-- 输入区域 -->
            <section class="input-section">
                <div class="form-group">
                    <label for="voice-search">选择语音</label>
                    <div class="voice-selector">
                        <input
                            type="text"
                            id="voice-search"
                            placeholder="搜索语音（如：中文、英语、French...）"
                            autocomplete="off"
                        >
                        <button id="voice-toggle" class="voice-toggle-btn" title="展开/收起">
                            <span id="voice-toggle-icon">▼</span>
                        </button>
                    </div>
                    <div id="voice-dropdown" class="voice-dropdown hidden">
                        <div class="voice-list" id="voice-list">
                            <div class="loading-voices">加载中...</div>
                        </div>
                    </div>
                    <div id="selected-voice" class="selected-voice">
                        <span class="voice-placeholder">请选择语音</span>
                    </div>
                    <input type="hidden" id="voice-select" value="">
                </div>

                <div class="form-group">
                    <label for="rate-slider">语速调节: <span id="rate-value">正常</span></label>
                    <div class="rate-control">
                        <span class="rate-label">慢</span>
                        <input type="range" id="rate-slider" min="-50" max="100" value="0" step="10">
                        <span class="rate-label">快</span>
                    </div>
                    <div class="rate-percentages">
                        <span class="rate-option" data-rate="-50">0.5x</span>
                        <span class="rate-option" data-rate="-25">0.75x</span>
                        <span class="rate-option active" data-rate="0">1x</span>
                        <span class="rate-option" data-rate="25">1.25x</span>
                        <span class="rate-option" data-rate="50">1.5x</span>
                        <span class="rate-option" data-rate="100">2x</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="text-input">输入文本</label>
                    <textarea
                        id="text-input"
                        placeholder="请输入要转换的文本..."
                        maxlength="5000"
                    ></textarea>
                    <div class="char-count">
                        <span id="char-count">0</span> / 5000
                    </div>
                </div>

                <button id="generate-btn" class="btn-primary">
                    <span class="btn-icon">🎵</span>
                    生成语音
                </button>
            </section>

            <!-- 音频列表 -->
            <section class="list-section">
                <div class="section-header">
                    <h2>📚 语音列表</h2>
                    <button id="refresh-btn" class="btn-icon-only" title="刷新列表">🔄</button>
                </div>

                <div id="audio-list" class="audio-list">
                    <div class="empty-state">
                        <p>暂无语音文件</p>
                        <p class="hint">在上方输入文本并生成语音</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 加载遮罩 -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
        <p class="loading-text">生成中...</p>
        <button id="cancel-btn" class="btn-cancel">取消生成</button>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
